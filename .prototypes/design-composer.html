     Tailwind utility classes; since this file has no build step, the utility

  :root {
    --ink: #0f172a;
    --paper: #faf7f1;
    --line: #0f172a;
    --accent: #fde047;
    --shadow: 4px 4px 0 0 #0f172a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #06080d;
    color: #f8fafc;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── scroll-driven warm day→night backdrop (à la design-sky-gradient) ── */
  #backdrop {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background: rgb(135, 206, 235);
    transition: background-color 80ms linear;
  }
  #backdrop::after {
    /* faint pixel-landscape silhouette so blend/contrast reads at the foot */
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0; height: 22vh;
    background:
      linear-gradient(180deg, transparent, rgba(8, 11, 18, 0.55)),
      repeating-linear-gradient(90deg, rgba(8,11,18,0.35) 0 40px, rgba(8,11,18,0.45) 40px 80px);
    -webkit-mask: linear-gradient(180deg, transparent, #000 60%);
    mask: linear-gradient(180deg, transparent, #000 60%);
  }
  #sun {
    position: fixed; left: 50%; z-index: 0; pointer-events: none;
    width: 90px; height: 90px; border-radius: 50%;
    background: #fef3c7;
    box-shadow: 0 0 80px 30px rgba(254, 243, 199, 0.5);
    transform: translateX(-50%);
    transition: top 80ms linear, opacity 120ms linear, background-color 120ms linear;
  }

  #preview { position: relative; z-index: 1; }

  /* ── floating "Design 🎨" trigger (à la DesignModeHost) ── */
  #designTrigger {
    position: fixed; bottom: 16px; right: 16px; z-index: 50;
    background: #0f172a; color: #fff;
    min-height: 44px; padding: 12px 14px;
    border: 2px dashed #fde047;
    box-shadow: 4px 4px 0 0 rgba(253, 224, 71, 0.5);
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 0.12em;
    cursor: pointer;
    transition: transform 120ms ease-out;
  }
  #designTrigger:hover { transform: translateY(-2px); }

  /* ── modal panel (right-docked, à la panel-dialog-modal--right) ── */
  #panelBackdrop {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(6, 9, 15, 0.55);
    display: none;
  }
  #panelBackdrop.open { display: block; }
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 61;
    width: min(420px, 100vw);
    background: #fff; color: #0f172a;
    transform: translateX(100%);
    transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px -12px rgba(0,0,0,0.5);
  }
  #panelBackdrop.open #panel { transform: translateX(0); }
  .panel-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 20px 20px 24px; }
  .panel-close {
    position: absolute; top: 8px; right: 8px; z-index: 20;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: #fff; color: #0f172a;
    border: 2px solid #0f172a; font-weight: 900; font-size: 18px; line-height: 1;
    cursor: pointer;
  }
  .panel-close:hover { background: #0f172a; color: #fff; }
  .panel-title {
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.03em;
    margin: 0 0 4px;
  }
  .panel-sub { font-size: 12px; opacity: 0.7; margin: 0 0 16px; line-height: 1.4; }

  .baseline-box {

  }

  .ctl-label { font-size: 9px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.18em; opacity: 0.55; margin-bottom: 6px; }
  .ctl-seg { display: flex; flex-wrap: wrap; gap: 4px; }

  .ctl-swatches button:hover { border-color: #0f172a; }

  .ctl-slider-head { display: flex; align-items: baseline; justify-content: space-between; }

  input[type="range"].cmp-slider { width: 100%; }
  .ctl-toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
  .ctl-toggle .tg-label { font-size: 9px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.18em; opacity: 0.55; }
  .baseline-box .ctl-toggle .tg-label { opacity: 0.9; color: #fff; }
  .tg-switch { position: relative; display: inline-flex; height: 20px; width: 36px; flex-shrink: 0; border: 2px solid #0f172a; background: #fff; transition: background 120ms; }
  .baseline-box .tg-switch { border-color: #fff; }
  .tg-switch[data-on="true"] { background: #6ee7b7; }
  .tg-knob { position: absolute; top: 0; height: 14px; width: 14px; background: #0f172a; transition: transform 120ms; }
  .baseline-box .tg-knob { background: #fff; }
  .tg-switch[data-on="true"] .tg-knob { transform: translateX(16px); }

  .spec-head { margin: 24px 0 8px; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.18em; opacity: 0.6; }
  .spec-out {
    display: block; font-size: 12px; line-height: 1.5; word-break: break-all;

  .btn-copy { flex: 1; background: #0f172a; color: #fff; padding: 8px 12px; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; border: 2px solid #0f172a; cursor: pointer; font-family: inherit; }
  .btn-copy:hover { background: #334155; }
  .btn-reset { padding: 8px 12px; border: 2px solid #0f172a; background: #fff; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; font-family: inherit; }
  .btn-reset:hover { background: #f1f5f9; }
  .spec-hint { margin: 8px 0 0; font-size: 10px; opacity: 0.6; line-height: 1.4; }
  .panel-disabled { opacity: 0.4; pointer-events: none; user-select: none; }

/* ── shared tokens (types.ts) ───────────────────────────────────────────── */

  craft: "#a7f3d0", ai: "#bfdbfe", learning: "#99f6e4", teaching: "#fde68a",
  "movies-tv": "#fecaca", family: "#fecdd3", music: "#c7d2fe", games: "#e9d5ff",

function linkStroke(source, accent, isNight) {
  switch (source) {
    case "sky": return isNight ? "#c7d2fe" : "#7dd3fc";
    case "earth": return "#8a5a28";
    case "accent": return accent;

/* ════════════════════════════════════════════════════════════════════
   BACKDROP — scroll-driven warm day→night sky (anchors from
   design-sky-gradient.html: noon → dusk → night).
   isNight (used by every layer) flips once scroll passes the dusk→night band.
   ════════════════════════════════════════════════════════════════════ */
const NOON = { r: 135, g: 206, b: 235 };
const DUSK = { r: 244, g: 164, b: 96 };
const NIGHT = { r: 20, g: 10, b: 50 };
const clamp01 = (x) => Math.max(0, Math.min(1, x));
function lerpRgb(a, b, t) { return { r: Math.round(a.r + (b.r - a.r) * t), g: Math.round(a.g + (b.g - a.g) * t), b: Math.round(a.b + (b.b - a.b) * t) }; }
// held anchors with compressed transitions (the "held" preset shape).
function skyAt(p) {
  const P1S = 0.22, P1E = 0.40, P2S = 0.60, P2E = 0.80;
  if (p <= P1S) return { rgb: NOON, night: false };
  if (p < P1E) return { rgb: lerpRgb(NOON, DUSK, (p - P1S) / (P1E - P1S)), night: false };
  if (p <= P2S) return { rgb: DUSK, night: false };
  if (p < P2E) { const t = (p - P2S) / (P2E - P2S); return { rgb: lerpRgb(DUSK, NIGHT, t), night: t > 0.5 }; }
  return { rgb: NIGHT, night: true };
}
let CURRENT_NIGHT = false;
const backdropEl = document.getElementById("backdrop");
const sunEl = document.getElementById("sun");
function scrollProgress() {
  const max = document.documentElement.scrollHeight - window.innerHeight;
  return max > 0 ? clamp01(window.scrollY / max) : 0;
}
function paintBackdrop() {
  const p = scrollProgress();
  const { rgb, night } = skyAt(p);
  backdropEl.style.backgroundColor = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
  // sun sinks toward the horizon and fades into night.
  const top = 40 + (window.innerHeight - 200) * p;
  sunEl.style.top = top + "px";
  sunEl.style.opacity = (1 - clamp01((p - 0.6) / 0.2) * 0.92).toFixed(2);
  if (night !== CURRENT_NIGHT) { CURRENT_NIGHT = night; renderPreview(); } // re-key night-aware layers
}

/* ════════════════════════════════════════════════════════════════════
   LAYER 1 — SECTION STAGES (18). render(ctx, inner) wraps the inner cluster
   HTML in the full-bleed stage. ctx = { topic, index, isNight, params, accent }
   (accent is null when the accent source is "none").

   Scroll-driven stages (parallax / marquee / floating-island) register a
   per-element scroll handler via SCROLL_HOOKS after each render; entrance
   stages (stacked / zoom / curtain) settle to their shown state on mount
   (IntersectionObserver), reduced-motion safe.
   ════════════════════════════════════════════════════════════════════ */
let SCROLL_HOOKS = [];     // [{ fn }] re-collected each renderPreview
let ENTRANCE_OBS = [];     // IntersectionObservers to disconnect on re-render
let SECTION_AFTER = [];    // post-mount callbacks a stage queues during render (wiring scroll/IO)

const SECTIONS = {
  "centered-monolith": {

  "parallax-depth": {

      const scrim = c.params.scrim / 100;

      const html = '<article id="' + id + '" class="cmp-stage relative flex flex-col px-6 items-center justify-center text-center" style="min-height:' + c.params.height + "vh;--cmp-accent:" + (c.accent || "transparent") + '">' +

        '<div class="cmp-parallax-layer" data-px="-28" style="background:radial-gradient(ellipse at center, rgba(0,0,0,' + (scrim + 0.1) + ') 0%, transparent 65%)" aria-hidden="true"></div>' +
        '<div class="relative z-10 w-full flex flex-col items-center" data-px="36">' + inner + "</div></article>";
      // register scroll parallax (skips under reduced-motion)

const SECTION_ORDER = ["centered-monolith", "edge-anchored", "split-stage", "letterbox", "spotlight-vignette", "parallax-depth", "diagonal-cut", "framed-window", "marquee-scroll", "stacked-cards", "full-type", "horizon-band", "peek-reveal", "triptych", "oversized-number", "floating-island", "zoom-focus", "curtain-reveal"];

/* Entrance reveal: fire once the stage scrolls into view (threshold ~0.3),
   reduced-motion safe (apply immediately). `selector` = the [data-enter] node;
   `apply(node)` mutates it to the shown state. */
function enterObserve(stageId, enterKey, apply, stageLevel) {
  const el = document.getElementById(stageId); if (!el) return;
  const node = stageLevel ? el : el.querySelector('[data-enter="' + enterKey + '"]');
  const fire = () => { stageLevel ? apply() : apply(node); };
  if (prefersReduced() || typeof IntersectionObserver === "undefined") { fire(); return; }
  const io = new IntersectionObserver((entries) => {
    for (const e of entries) if (e.isIntersecting) { fire(); io.disconnect(); }
  }, { threshold: 0.3 });
  io.observe(el);
  ENTRANCE_OBS.push(io);
}

/* ════════════════════════════════════════════════════════════════════
   LAYER 3 — LINK CONNECTORS (8 + none). render(ctx) returns the seam HTML.
   ctx = { index, isNight, params, accent }. Vertical rails straddle the seam;
   discrete connectors (dashes/stars/dots) size their viewBox to the rail's
   real aspect ratio so dots stay round (useAspectViewBox); the draw-in reveal
   fires on scroll entry (useDrawIn). Both wired via LINK_AFTER post-mount.
   ════════════════════════════════════════════════════════════════════ */
let LINK_AFTER = [];

// reveal: flip `shown` once the rail enters (threshold 0 + bottom rootMargin),
// reduced-motion safe. Calls back with the <svg> element so the connector can
// apply its stroke-dash / clip-path transition target.
function wireDrawIn(svgId, animate, onShow) {
  if (!animate || prefersReduced() || typeof IntersectionObserver === "undefined") {
    const el = document.getElementById(svgId); if (el) onShow(el); return;
  }
  const el = document.getElementById(svgId); if (!el) return;
  const io = new IntersectionObserver((entries) => {
    for (const e of entries) if (e.isIntersecting) { onShow(el); io.disconnect(); }
  }, { threshold: 0, rootMargin: "0px 0px -20% 0px" });
  io.observe(el);
  ENTRANCE_OBS.push(io);
}
// match the rail's real aspect ratio into a viewBox height (discrete connectors)
function wireAspect(svgId, redraw) {
  const el = document.getElementById(svgId); if (!el || typeof ResizeObserver === "undefined") return;
  const measure = () => {
    const b = el.getBoundingClientRect();
    if (b.width > 0 && b.height > 0) redraw((SEAM_VIEWBOX_W * b.height) / b.width);
  };
  measure();
  const ro = new ResizeObserver(measure); ro.observe(el); ENTRANCE_OBS.push({ disconnect: () => ro.disconnect() });
}

const LINK_ORDER = ["none", "ruled-seam", "flowing-curve", "botanical-vine", "trail-dashes", "constellation-starline", "river-ribbon", "strata-seam", "dotted-thread"];

// shared seam wrapper: the rail + svg. `nonStretch` connectors keep their
// markup ready for aspect re-measure (handled by their LINK_AFTER hook).
function seam(c, svgId, H, svgInner, nonStretch, svgStyle) {
  return '<div class="cmp-seam" aria-hidden="true"><div class="cmp-seam-rail" style="' + railVarsStyle(c.params) + '">' +
    '<svg id="' + svgId + '" viewBox="0 0 100 ' + H + '" preserveAspectRatio="none"' + (svgStyle ? ' style="' + svgStyle + '"' : "") + ">" + svgInner + "</svg></div></div>";
}
// if the aspect re-measure rebuilt innerHTML and the draw-in already fired,
// re-apply the shown state so a resize mid-reveal doesn't snap back to hidden.
function maybeShow(el, animate) {
  if (!animate || prefersReduced()) {
    el.querySelectorAll("[data-trail],[data-star],[data-dots]").forEach((p) => { p.style.clipPath = "inset(0 0 0 0)"; });
    el.querySelectorAll("[data-node]").forEach((n) => { n.style.opacity = "1"; });
  }
}

/* ════════════════════════════════════════════════════════════════════
   BASELINE — today's shipped look (composer/current.tsx). Rendered when the
   "Shipped baseline" toggle is on. py-24 spacing, heading flips white at
   night, accent-bar/stamped/full-bleed layouts, frosted teaser plate, sided
   trigger cards + the locked-dark Career card.
   ════════════════════════════════════════════════════════════════════ */
const LAYOUT_BY_TOPIC = { craft: "accent-bar", ai: "stamped", learning: "accent-bar", teaching: "accent-bar", "movies-tv": "full-bleed", family: "accent-bar", music: "stamped", games: "stamped" };

function renderBaselineTopic(topic, index, isNight) {
  const accent = TOPIC_ACCENT[topic.id];
  const layout = LAYOUT_BY_TOPIC[topic.id];
  const headingClass = "topic-heading text-4xl md:text-6xl font-black uppercase tracking-tighter transition-colors duration-300 " + (isNight ? "text-white" : "text-slate-900");
  const flo = flourish(topic.id, "w-12 h-12 shrink-0 pointer-events-none");
  let layoutStyle = "position:relative;padding-top:96px;padding-bottom:96px;";
  let extra = "";
  if (layout === "accent-bar") { layoutStyle += "padding-left:32px;"; extra = '<span style="content:\'\';position:absolute;left:0;top:0;bottom:0;width:10px;background:' + accent + '"></span>'; }
  if (layout === "full-bleed") { extra = '<span style="position:absolute;left:0;right:0;bottom:0;height:40%;background:' + accent + ';z-index:-1"></span>'; }
  const stamp = layout === "stamped" ? flourish(topic.id, "absolute -rotate-6 pointer-events-none", "right:16px;top:16px;width:48px;height:48px;") : "";
  const header = layout === "stamped"
    ? '<h2 class="' + headingClass + '">' + esc(topic.heading) + "</h2>"
    : '<div class="flex items-center gap-3"><h2 class="' + headingClass + '">' + esc(topic.heading) + "</h2>" + flo + "</div>";

  let cards = "";
  for (const r of resolvedTriggers(topic)) {
    if (r.isCareer) {
      cards += '<button ' + TBTN + ' class="btn-brutalist btn-brutalist--dark w-full flex items-center justify-between gap-6 font-black uppercase tracking-tighter text-xl md:text-3xl" style="background:#0f172a;color:#fff;border:2px solid #0f172a;padding:24px;box-shadow:6px 6px 0 0 #0f172a">' + icon("ArrowLeft", 32, "shrink-0") + "<span>" + esc(r.title) + "</span></button>";
      continue;
    }
    const isRight = r.side === "right";
    const iconEl = '<div class="w-14 h-14 flex items-center justify-center border-2 border-slate-900 shrink-0" style="' + tileStyle(r.tileCls) + '">' + icon(r.iconKey, 24) + "</div>";
    const contentEl = '<div class="min-w-0"><h3 class="text-2xl md:text-3xl font-black uppercase leading-none mb-1 truncate">' + esc(r.title) + "</h3>" + (r.subtitle ? '<p class="text-sm text-slate-600 font-medium line-clamp-1">' + esc(r.subtitle) + "</p>" : "") + "</div>";
    const arrowEl = isRight ? icon("ArrowRight", 28, "shrink-0 group-hover:translate-x-1 transition-transform") : icon("ArrowLeft", 28, "shrink-0 group-hover:-translate-x-1 transition-transform");
    const inner = isRight
      ? '<div class="flex items-center gap-5 min-w-0">' + iconEl + contentEl + "</div>" + arrowEl
      : '<div class="flex items-center gap-5 min-w-0">' + arrowEl + contentEl + "</div>" + iconEl;
    cards += '<button ' + TBTN + ' class="btn-brutalist group block w-full max-w-2xl text-left p-6 md:p-8 ' + (isRight ? "ml-auto" : "ml-0") + '" style="background:#fff;color:#0f172a;border:2px solid #0f172a;box-shadow:6px 6px 0 0 #0f172a"><div class="flex items-center justify-between gap-6">' + inner + "</div></button>";
  }

  return '<article class="relative" style="' + layoutStyle + '">' + extra + stamp +
    '<header class="max-w-3xl">' + header +
    '<p class="mt-3 text-lg md:text-xl font-medium leading-relaxed bg-white/40 backdrop-blur-md p-3 border-l-4 border-slate-900" style="color:' + (isNight ? "#fff" : "#0f172a") + '">' + esc(topic.teaser) + "</p></header>" +
    '<div class="space-y-6 mt-6">' + cards + "</div></article>";
}

/* ════════════════════════════════════════════════════════════════════
   STATE — mirrors useComposerControls.ts: a baseline flag + one pick + that
   pick's params per layer, sanitized + persisted to a prototype localStorage
   key. Switching a layer's id resets that layer's params to the pick defaults.
   ════════════════════════════════════════════════════════════════════ */
const STORAGE_KEY = "alp-proto-composer";
const DEFAULT_SECTION = "centered-monolith", DEFAULT_INNER = "minimal", DEFAULT_LINK = "none";
const clampN = (n, lo, hi) => Math.min(Math.max(n, lo), hi);
const oneOf = (v, allowed, fb) => (allowed.indexOf(v) >= 0 ? v : fb);

function defaultState() {
  return {
    baseline: false,
    section: DEFAULT_SECTION, sectionParams: Object.assign({}, SECTIONS[DEFAULT_SECTION].defaults),
    inner: DEFAULT_INNER, innerParams: Object.assign({}, INNERS[DEFAULT_INNER].defaults),
    link: DEFAULT_LINK, linkParams: Object.assign({}, LINKS[DEFAULT_LINK].defaults),
  };
}
function sanitizeSectionParams(section, raw) {
  const def = SECTIONS[section] || SECTIONS[DEFAULT_SECTION], d = def.defaults, o = raw || {};
  const lo = def.heightRange[0], hi = def.heightRange[1];
  return {
    accent: oneOf(o.accent, ["topic", "fixed", "none"], d.accent),
    align: oneOf(o.align, ["center", "left", "right", "bottom"], d.align),
    scrim: clampN(typeof o.scrim === "number" ? o.scrim : d.scrim, 0, 80),
    height: clampN(typeof o.height === "number" ? o.height : d.height, lo, hi),
  };
}
function sanitizeInnerParams(inner, raw) {
  const d = (INNERS[inner] || INNERS[DEFAULT_INNER]).defaults, o = raw || {};
  return {
    color: oneOf(o.color, ["accent", "neutral", "inverted"], d.color),
    density: oneOf(o.density, ["cozy", "comfortable", "roomy"], d.density),
    motif: typeof o.motif === "boolean" ? o.motif : d.motif,
  };
}
function sanitizeLinkParams(link, raw) {
  const d = (LINKS[link] || LINKS[DEFAULT_LINK]).defaults, o = raw || {};
  return {
    color: oneOf(o.color, ["ink", "sky", "earth", "accent"], d.color),
    weight: clampN(typeof o.weight === "number" ? o.weight : d.weight, 1, 8),
    curve: clampN(typeof o.curve === "number" ? o.curve : d.curve, 0, 100),
    height: clampN(typeof o.height === "number" ? o.height : d.height, 20, 150),
    blend: clampN(typeof o.blend === "number" ? o.blend : d.blend, 0, 100),
    animate: typeof o.animate === "boolean" ? o.animate : d.animate,
  };
}
function sanitize(raw) {
  const o = raw || {};
  const section = SECTIONS[o.section] ? o.section : DEFAULT_SECTION;
  const inner = INNERS[o.inner] ? o.inner : DEFAULT_INNER;
  const link = LINKS[o.link] ? o.link : DEFAULT_LINK;
  return {
    baseline: typeof o.baseline === "boolean" ? o.baseline : false,
    section, sectionParams: sanitizeSectionParams(section, o.sectionParams),
    inner, innerParams: sanitizeInnerParams(inner, o.innerParams),
    link, linkParams: sanitizeLinkParams(link, o.linkParams),
  };
}

let STATE = defaultState();
try { const stored = localStorage.getItem(STORAGE_KEY); if (stored) STATE = sanitize(JSON.parse(stored)); } catch (e) {}
function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch (e) {} }

/* copy-spec string — mirrors buildComposerSpec exactly (stable order, baseline
   bypass, link.* omitted when none, link.curve omitted for straight links). */
function buildComposerSpec(s) {
  if (s.baseline) return "baseline: on";
  const sp = s.sectionParams, ip = s.innerParams;
  const parts = [
    "section: " + s.section, "section.accent: " + sp.accent, "section.align: " + sp.align,
    "section.scrim: " + sp.scrim, "section.height: " + sp.height,
    "inner: " + s.inner, "inner.color: " + ip.color, "inner.density: " + ip.density,
    "inner.motif: " + (ip.motif ? "on" : "off"), "link: " + s.link,
  ];
  if (s.link !== "none") {
    const lp = s.linkParams;
    parts.push("link.color: " + lp.color, "link.weight: " + lp.weight);
    if (LINKS[s.link].hasCurve) parts.push("link.curve: " + lp.curve);
    parts.push("link.height: " + lp.height, "link.blend: " + lp.blend, "link.animate: " + (lp.animate ? "on" : "off"));
  }
  return parts.join(" | ");
}

/* ════════════════════════════════════════════════════════════════════
   DISPATCHER — mirrors CraftSection + TopicComposition: each topic gets the
   chosen stage wrapping the chosen cluster; the chosen connector renders at
   each seam after every topic but the last. Re-renders on any control change.
   ════════════════════════════════════════════════════════════════════ */
const previewEl = document.getElementById("preview");

function renderPreview() {
  // tear down observers/hooks from the previous render
  ENTRANCE_OBS.forEach((o) => { try { o.disconnect(); } catch (e) {} });
  ENTRANCE_OBS = []; SCROLL_HOOKS = []; SECTION_AFTER = []; LINK_AFTER = [];

  const isNight = CURRENT_NIGHT;
  let html = "";

  if (STATE.baseline) {
    html = '<div class="px-6"><div class="max-w-5xl mx-auto">';
    TOPICS.forEach((topic, i) => { html += renderBaselineTopic(topic, i, isNight); });
    html += "</div></div>";
    previewEl.innerHTML = html;
    return;
  }

  const section = SECTIONS[STATE.section], inner = INNERS[STATE.inner];
  const showLinks = STATE.link !== "none";
  html = '<div class="px-6"><div class="max-w-5xl mx-auto">';
  TOPICS.forEach((topic, i) => {
    const topicAccent = TOPIC_ACCENT[topic.id];
    const sectionAccent = STATE.sectionParams.accent === "topic" ? topicAccent : STATE.sectionParams.accent === "fixed" ? "#fde68a" : null;
    const clusterAccent = sectionAccent != null ? sectionAccent : topicAccent;
    const innerHtml = inner.render({ topic, index: i, isNight, params: STATE.innerParams, accent: clusterAccent });
    html += section.render({ topic, index: i, isNight, params: STATE.sectionParams, accent: sectionAccent }, innerHtml);
    if (showLinks && i < TOPICS.length - 1) {
      html += LINKS[STATE.link].render({ index: i, isNight, params: STATE.linkParams, accent: topicAccent });
    }
  });
  html += "</div></div>";
  previewEl.innerHTML = html;

  // run post-mount wiring queued by stages + links (scroll/IO/aspect)
  SECTION_AFTER.forEach((fn) => fn());
  LINK_AFTER.forEach((fn) => fn());
  runScrollHooks();
}

let rafPending = false;
function runScrollHooks() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    paintBackdrop();
    SCROLL_HOOKS.forEach((h) => h.fn());
  });
}
window.addEventListener("scroll", runScrollHooks, { passive: true });
window.addEventListener("resize", runScrollHooks);

/* ════════════════════════════════════════════════════════════════════
   PANEL — mirrors DesignPanel.tsx: top "Shipped baseline" toggle, three
   labeled single-select layers (SECTION STYLE / INSIDE THE TOPIC / BETWEEN
   TOPICS) with per-selected-item param controls (segmented / slider /
   swatches / toggle), Spec readout + Copy spec + Reset. The whole panel is
   re-rendered from STATE on every change (cheap; matches the React re-render).
   ════════════════════════════════════════════════════════════════════ */
const ACCENT_SWATCHES = [
  { value: "topic", label: "Topic", swatch: "linear-gradient(90deg,#a7f3d0,#c7d2fe)" },
  { value: "fixed", label: "Amber", swatch: "#fde68a" },
  { value: "none", label: "None", swatch: "repeating-linear-gradient(45deg,#fff 0 3px,#cbd5e1 3px 6px)" },
];
const LINK_COLOR_SWATCHES = [
  { value: "ink", label: "Ink", swatch: "#0f172a" },
  { value: "sky", label: "Sky", swatch: "#7dd3fc" },
  { value: "earth", label: "Earth", swatch: "#8a5a28" },
  { value: "accent", label: "Accent", swatch: "linear-gradient(90deg,#a7f3d0,#c7d2fe)" },
];

// control builders → HTML string. Each emits data-attrs the panel delegates on.
function segmented(label, value, options, key) {
  let btns = options.map((o) => '<button type="button" data-seg="' + key + '" data-val="' + o.value + '" aria-pressed="' + (o.value === value) + '">' + esc(o.label) + "</button>").join("");
  return '<div><div class="ctl-label">' + esc(label) + '</div><div class="ctl-seg">' + btns + "</div></div>";
}
function swatches(label, value, options, key) {
  let btns = options.map((o) => '<button type="button" data-sw="' + key + '" data-val="' + o.value + '" aria-pressed="' + (o.value === value) + '" title="' + esc(o.label) + '"><span class="chip" style="background:' + o.swatch + '"></span><span class="sw-label">' + esc(o.label) + "</span></button>").join("");
  return '<div><div class="ctl-label">' + esc(label) + '</div><div class="ctl-swatches">' + btns + "</div></div>";
}
function slider(label, value, min, max, unit, key) {
  return '<div><div class="ctl-slider-head"><div class="ctl-label">' + esc(label) + '</div><span class="ctl-slider-val">' + value + (unit || "") + '</span></div>' +
    '<input type="range" class="cmp-slider" min="' + min + '" max="' + max + '" step="1" value="' + value + '" data-slider="' + key + '"></div>';
}
function toggle(label, checked, key) {
  return '<button type="button" class="ctl-toggle" data-toggle="' + key + '" aria-checked="' + checked + '"><span class="tg-label">' + esc(label) + '</span><span class="tg-switch" data-on="' + checked + '"><span class="tg-knob"></span></span></button>';
}

function sectionParamsBlock() {
  const id = STATE.section, p = STATE.sectionParams, range = SECTIONS[id].heightRange;
  return swatches("Accent source", p.accent, ACCENT_SWATCHES, "s.accent") +
    segmented("Content position", p.align, [{ value: "center", label: "Center" }, { value: "left", label: "Left" }, { value: "right", label: "Right" }, { value: "bottom", label: "Bottom" }], "s.align") +
    slider("Scrim / backdrop", p.scrim, 0, 80, "", "s.scrim") +
    slider("Stage height", p.height, range[0], range[1], "vh", "s.height");
}
function innerParamsBlock() {
  const id = STATE.inner, p = STATE.innerParams;
  return segmented("Color treatment", p.color, [{ value: "accent", label: "Accent" }, { value: "neutral", label: "Neutral" }, { value: "inverted", label: "Inverted" }], "i.color") +
    segmented("Density", p.density, [{ value: "cozy", label: "Cozy" }, { value: "comfortable", label: "Comfy" }, { value: "roomy", label: "Roomy" }], "i.density") +
    toggle(INNERS[id].motifLabel, p.motif, "i.motif");
}
function linkParamsBlock() {
  const id = STATE.link, p = STATE.linkParams;
  let html = swatches("Color", p.color, LINK_COLOR_SWATCHES, "l.color") + slider("Weight", p.weight, 1, 8, "px", "l.weight");
  if (LINKS[id].hasCurve) html += slider("Curve amount", p.curve, 0, 100, "", "l.curve");
  html += slider("Height", p.height, 20, 150, "vh", "l.height") + slider("Blend into sections", p.blend, 0, 100, "%", "l.blend") + toggle("Animate on scroll", p.animate, "l.animate");
  return html;
}

function layerRow(layer, id, selected, paramsHtml) {
  const def = (layer === "section" ? SECTIONS : layer === "inner" ? INNERS : LINKS)[id];
  return '<div class="layer-row' + (selected ? " selected" : "") + '">' +
    '<button type="button" class="row-select" data-pick="' + layer + '" data-id="' + id + '"><div class="row-head"><span class="row-bullet"></span><span class="row-label">' + esc(def.label) + '</span></div><p class="row-feel">' + esc(def.feel) + "</p></button>" +
    (selected && paramsHtml ? '<div class="row-params">' + paramsHtml + "</div>" : "") + "</div>";
}

const panelEl = document.getElementById("panel");
const panelBackdropEl = document.getElementById("panelBackdrop");

function renderPanel() {
  const spec = buildComposerSpec(STATE);
  const disabled = STATE.baseline;
  let secRows = SECTION_ORDER.map((id) => layerRow("section", id, id === STATE.section, id === STATE.section ? sectionParamsBlock() : "")).join("");
  let innRows = INNER_ORDER.map((id) => layerRow("inner", id, id === STATE.inner, id === STATE.inner ? innerParamsBlock() : "")).join("");
  let lnkRows = LINK_ORDER.map((id) => layerRow("link", id, id === STATE.link, id === STATE.link && id !== "none" ? linkParamsBlock() : "")).join("");

  panelEl.innerHTML =
    '<button type="button" class="panel-close" data-close="1" aria-label="Close">&times;</button>' +
    '<div class="panel-scroll">' +
    '<h2 class="panel-title">Composer</h2>' +
    '<p class="panel-sub">Standalone prototype. Stack a section style &times; an inner content style &times; a between-topic connector. Tune each layer’s params, then scroll the page to judge it against the warm landscape, day &rarr; night.</p>' +
    '<div class="baseline-box">' + toggle("Shipped baseline (A/B vs production)", STATE.baseline, "baseline") + "</div>" +
    '<div class="' + (disabled ? "panel-disabled" : "") + '" aria-hidden="' + disabled + '">' +
    '<div class="layer-head">Section style &mdash; the stage</div><div class="layer-list">' + secRows + "</div>" +
    '<div class="layer-head">Inside the topic &mdash; the cluster</div><div class="layer-list">' + innRows + "</div>" +
    '<div class="layer-head">Between topics &mdash; the connector</div><div class="layer-list">' + lnkRows + "</div>" +
    "</div>" +
    '<div class="spec-head">Spec</div><output class="spec-out" id="specOut">' + esc(spec) + "</output>" +
    '<div class="spec-actions"><button type="button" class="btn-copy" data-copy="1">Copy spec</button><button type="button" class="btn-reset" data-reset="1">Reset</button></div>' +
    '<p class="spec-hint">Click Copy spec, then paste the line back into chat to lock the composition.</p>' +
    "</div>";
}

/* state mutators (mirror the useComposerControls callbacks) */
function setLayer(layer, id) {
  if (layer === "section") { STATE.section = id; STATE.sectionParams = Object.assign({}, SECTIONS[id].defaults); }
  else if (layer === "inner") { STATE.inner = id; STATE.innerParams = Object.assign({}, INNERS[id].defaults); }
  else { STATE.link = id; STATE.linkParams = Object.assign({}, LINKS[id].defaults); }
  commit();
}
function patchParam(key, value) {
  const [layer, field] = key.split(".");
  if (layer === "s") STATE.sectionParams = sanitizeSectionParams(STATE.section, Object.assign({}, STATE.sectionParams, { [field]: value }));
  else if (layer === "i") STATE.innerParams = sanitizeInnerParams(STATE.inner, Object.assign({}, STATE.innerParams, { [field]: value }));
  else STATE.linkParams = sanitizeLinkParams(STATE.link, Object.assign({}, STATE.linkParams, { [field]: value }));
  commit();
}
function commit() { persist(); renderPreview(); renderPanel(); }

/* delegated panel events (clicks for picks/segments/swatches/toggles/buttons) */
panelEl.addEventListener("click", (e) => {
  const t = e.target.closest("[data-pick],[data-seg],[data-sw],[data-toggle],[data-copy],[data-reset],[data-close]");
  if (!t) return;
  if (t.dataset.close) { closePanel(); return; }
  if (t.dataset.pick) { setLayer(t.dataset.pick, t.dataset.id); return; }
  if (t.dataset.seg) { patchParam(t.dataset.seg, t.dataset.val); return; }
  if (t.dataset.sw) { patchParam(t.dataset.sw, t.dataset.val); return; }
  if (t.dataset.toggle) {
    const key = t.dataset.toggle;
    if (key === "baseline") { STATE.baseline = !STATE.baseline; commit(); }
    else {
      const cur = key === "i.motif" ? STATE.innerParams.motif : STATE.linkParams.animate;
      patchParam(key, !cur);
    }
    return;
  }
  if (t.dataset.copy) { copySpec(t); return; }
  if (t.dataset.reset) { STATE = defaultState(); commit(); return; }
});
// sliders fire on input (live) — only re-render preview + the slider readout,
// not the whole panel, so the thumb keeps focus while dragging.
panelEl.addEventListener("input", (e) => {
  const el = e.target.closest("[data-slider]"); if (!el) return;
  patchParamLive(el.dataset.slider, Number(el.value), el);
});
function patchParamLive(key, value, el) {
  const [layer, field] = key.split(".");
  if (layer === "s") STATE.sectionParams = sanitizeSectionParams(STATE.section, Object.assign({}, STATE.sectionParams, { [field]: value }));
  else if (layer === "i") STATE.innerParams = sanitizeInnerParams(STATE.inner, Object.assign({}, STATE.innerParams, { [field]: value }));
  else STATE.linkParams = sanitizeLinkParams(STATE.link, Object.assign({}, STATE.linkParams, { [field]: value }));
  persist();
  // update the inline value readout next to this slider
  const head = el.parentElement.querySelector(".ctl-slider-val");
  if (head) { const unit = head.textContent.replace(/[\d.-]/g, ""); head.textContent = value + unit; }
  // refresh the spec readout + the live preview
  const so = document.getElementById("specOut"); if (so) so.textContent = buildComposerSpec(STATE);
  renderPreview();
}

async function copySpec(btn) {
  const spec = buildComposerSpec(STATE);
  try {
    await navigator.clipboard.writeText(spec);
    btn.textContent = "Copied!";
  } catch (e) {
    const ta = document.createElement("textarea"); ta.value = spec; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); btn.textContent = "Copied!"; } catch (e2) { btn.textContent = "Copy failed"; }
    document.body.removeChild(ta);
  }
  setTimeout(() => { btn.textContent = "Copy spec"; }, 1500);
}

/* ── floating trigger + open/close (mirrors DesignModeHost) ──────────────── */
let lastTrigger = null;
const designTrigger = document.getElementById("designTrigger");
function openPanel() { lastTrigger = designTrigger; renderPanel(); panelBackdropEl.classList.add("open"); panelBackdropEl.setAttribute("aria-hidden", "false"); }
function closePanel() { panelBackdropEl.classList.remove("open"); panelBackdropEl.setAttribute("aria-hidden", "true"); if (lastTrigger) lastTrigger.focus(); }
designTrigger.addEventListener("click", openPanel);
panelBackdropEl.addEventListener("click", (e) => { if (e.target === panelBackdropEl) closePanel(); });
window.addEventListener("keydown", (e) => { if (e.key === "Escape" && panelBackdropEl.classList.contains("open")) closePanel(); });

/* ── INIT — paint backdrop, render preview, ready ───────────────────────── */
paintBackdrop();
renderPreview();
</script>
</body>
